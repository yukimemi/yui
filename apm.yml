name: yui
version: 0.7.16
description: |
  Dev-consumer APM config for the yui repo. yui itself is a Rust CLI
  and ships no agent primitives; this apm.yml only exists to install
  agent skills that contributors want available while working on yui
  — currently just the `renri` skill so AI sessions can manage
  worktrees / jj workspaces while developing.
author: yukimemi
dependencies:
  apm:
    - yukimemi/renri#v0.1.5
  mcp: []
includes: auto
scripts: {}
